<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiLK&WHITE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ──────────────────────────────────────
           BRAND TOKENS
        ────────────────────────────────────── */
        :root {
            --brand-primary: #000000;
            --brand-text: #000000;
            --brand-text-subtle: #555555;
            --brand-bg: #ffffff;
            --brand-page-bg: #ffffff;
            --brand-border: #e0e0e0;
            --font-heading: 'Inter', 'Helvetica Neue', Arial, sans-serif;
            --font-body: 'Inter', 'Helvetica Neue', Arial, sans-serif;
            --gap: 20px;
            --side-padding: 48px;
        }

        /* ──────────────────────────────────────
           RESET & BASE
        ────────────────────────────────────── */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: var(--font-body);
            background: var(--brand-bg);
            color: var(--brand-text);
            line-height: 1.6;
        }

        ::selection {
            background: var(--brand-primary);
            color: var(--brand-bg);
        }

        /* ──────────────────────────────────────
           NAVIGATION
        ────────────────────────────────────── */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 1000;
            padding: 0 var(--side-padding);
            height: 64px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--brand-border);
            transition: transform 0.3s ease;
        }

        .logo {
            font-family: var(--font-heading);
            font-size: 15px;
            font-weight: 400;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--brand-text);
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 36px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--brand-text);
            font-family: var(--font-body);
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            position: relative;
            transition: opacity 0.3s ease;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--brand-primary);
            transition: width 0.3s ease;
        }

        .nav-links a:hover {
            opacity: 0.6;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        /* Mobile Menu Toggle */
        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 4px;
        }

        .menu-toggle span {
            display: block;
            width: 22px;
            height: 1.5px;
            background: var(--brand-text);
            transition: all 0.3s ease;
        }

        /* ──────────────────────────────────────
           HERO / START
        ────────────────────────────────────── */
        #start {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 80px var(--side-padding) 60px;
        }

        #start h1 {
            font-family: var(--font-heading);
            font-size: clamp(32px, 5vw, 56px);
            font-weight: 300;
            letter-spacing: 10px;
            text-transform: uppercase;
            color: var(--brand-text);
            margin-bottom: 16px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.8s ease 0.2s forwards;
        }

        #start .subtitle {
            font-family: var(--font-body);
            font-size: 14px;
            font-weight: 300;
            color: var(--brand-text-subtle);
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.8s ease 0.4s forwards;
        }

        .scroll-indicator {
            position: absolute;
            bottom: 40px;
            left: 0;
            right: 0;
            text-align: center;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.8s forwards;
        }

        .scroll-indicator span {
            font-family: var(--font-body);
            font-size: 11px;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--brand-text);
            opacity: 0.3;
            animation: scrollPulse 2s ease infinite;
        }

        /* ──────────────────────────────────────
           GALLERY SECTION
        ────────────────────────────────────── */
        .gallery-section {
            padding: 40px var(--side-padding) 100px;
        }

        .section-label {
            font-family: var(--font-heading);
            font-size: 12px;
            font-weight: 400;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--brand-text-subtle);
            text-align: center;
            margin-bottom: 48px;
        }

        /* ──────────────────────────────────────
           MASONRY GRID
        ────────────────────────────────────── */
        .masonry {
            column-count: 2;
            column-gap: var(--gap);
            max-width: 1100px;
            margin: 0 auto;
        }

        .masonry-item {
            break-inside: avoid;
            margin-bottom: var(--gap);
            overflow: hidden;
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .masonry-item.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .masonry-item img {
            width: 100%;
            height: auto;
            display: block;
            /* Bilder werden 1:1 angezeigt – kein Beschnitt, keine Effekte */
        }

        /* ──────────────────────────────────────
           ABOUT SECTION
        ────────────────────────────────────── */
        #about {
            padding: 120px var(--side-padding);
            border-top: 1px solid var(--brand-border);
        }

        .about-inner {
            max-width: 640px;
            margin: 0 auto;
            text-align: center;
        }

        .about-inner h2 {
            font-family: var(--font-heading);
            font-size: clamp(24px, 3vw, 36px);
            font-weight: 300;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--brand-text);
            margin-bottom: 40px;
        }

        .about-inner p {
            font-family: var(--font-body);
            font-size: 16px;
            font-weight: 300;
            line-height: 1.9;
            color: var(--brand-text-subtle);
            margin-bottom: 24px;
        }

        /* ──────────────────────────────────────
           KONTAKT SECTION
        ────────────────────────────────────── */
        #kontakt {
            padding: 120px var(--side-padding);
            border-top: 1px solid var(--brand-border);
            text-align: center;
        }

        .kontakt-inner {
            max-width: 640px;
            margin: 0 auto;
        }

        .kontakt-inner h2 {
            font-family: var(--font-heading);
            font-size: clamp(24px, 3vw, 36px);
            font-weight: 300;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--brand-text);
            margin-bottom: 40px;
        }

        .kontakt-inner p {
            font-family: var(--font-body);
            font-size: 16px;
            font-weight: 300;
            line-height: 1.9;
            color: var(--brand-text-subtle);
            margin-bottom: 12px;
        }

        .kontakt-inner a {
            color: var(--brand-text-subtle);
            text-decoration: none;
            font-family: var(--font-body);
            font-size: 16px;
            font-weight: 300;
            line-height: 1.9;
            text-transform: uppercase;
            letter-spacing: 0;
            border: none;
            transition: opacity 0.3s ease;
        }

        .kontakt-inner a:hover {
            opacity: 0.6;
        }

        /* ──────────────────────────────────────
           FOOTER
        ────────────────────────────────────── */
        footer {
            padding: 40px var(--side-padding);
            border-top: 1px solid var(--brand-border);
            text-align: center;
        }

        footer p {
            font-family: var(--font-body);
            font-size: 12px;
            font-weight: 300;
            color: var(--brand-text-subtle);
            letter-spacing: 1px;
        }

        /* ──────────────────────────────────────
           ANIMATIONS
        ────────────────────────────────────── */
        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes scrollPulse {
            0%, 100% { opacity: 0.1; transform: scaleY(1); }
            50% { opacity: 0.4; transform: scaleY(1); }
        }

        /* ──────────────────────────────────────
           RESPONSIVE
        ────────────────────────────────────── */
        @media (max-width: 768px) {
            :root {
                --side-padding: 20px;
                --gap: 16px;
            }

            nav {
                padding: 0 20px;
            }

            .nav-links {
                display: none;
                position: absolute;
                top: 64px;
                left: 0;
                width: 100%;
                background: rgba(255, 255, 255, 0.98);
                backdrop-filter: blur(12px);
                flex-direction: column;
                align-items: center;
                padding: 32px 0;
                gap: 24px;
                border-bottom: 1px solid var(--brand-border);
            }

            .nav-links.open {
                display: flex;
            }

            .menu-toggle {
                display: flex;
            }

            .masonry {
                column-count: 1;
            }

            #about,
            #kontakt {
                padding: 80px var(--side-padding);
            }
        }

        @media (min-width: 769px) and (max-width: 1024px) {
            :root {
                --side-padding: 32px;
            }
        }
    </style>
</head>
<body>

    <!-- ═══════════════════════════════════════
         NAVIGATION
    ═══════════════════════════════════════ -->
    <nav>
        <div class="logo">Bilk&WHITE</div>
        <button class="menu-toggle" aria-label="Menü öffnen" onclick="document.querySelector('.nav-links').classList.toggle('open')">
            <span></span><span></span><span></span>
        </button>
        <ul class="nav-links">
            <li><a href="#start" onclick="closeMenu()">Start</a></li>
            <li><a href="#about" onclick="closeMenu()">About</a></li>
            <li><a href="#kontakt" onclick="closeMenu()">Kontakt</a></li>
        </ul>
    </nav>

    <!-- ═══════════════════════════════════════
         START / HERO
    ═══════════════════════════════════════ -->
    <section id="start">
        <h1>Bilk&WHITE</h1>
        
        <div class="scroll-indicator"><span>Scroll Down</span></div>

    <!-- ═══════════════════════════════════════
         GALERIE
    ═══════════════════════════════════════ -->
    <section id="galerie" class="gallery-section">
        

        <div class="masonry">

            <!--
            ╔═══════════════════════════════════════════════════╗
            ║  BILDER HINZUFÜGEN                               ║
            ║                                                   ║
            ║  Einfach weitere Blöcke nach diesem Muster        ║
            ║  unterhalb einfügen:                              ║
            ║                                                   ║
            ║  <div class="masonry-item">                       ║
            ║      <img src="pfad/zum/bild.jpg" alt="Titel">   ║
            ║  </div>                                           ║
            ║                                                   ║
            ║  Das Masonry-Layout ordnet die Bilder             ║
            ║  automatisch zweispaltig an – egal ob             ║
            ║  Hoch- oder Querformat. Kein Beschnitt.           ║
            ╚═══════════════════════════════════════════════════╝
            -->

            <!-- Bild 1 -->
            <div class="masonry-item">

            <!-- Bild 3 -->

            </div>

            <!-- Bild 4 -->
            <div class="masonry-item">
                <img src="runter.jpg" alt="runter">
            </div>

            <!-- Bild 5 -->
            <div class="masonry-item">
                <img src="coco.jpg" alt="coco">
            </div>

            <!-- Bild 6 -->
            <div class="masonry-item">
                <img src="smoke.jpg" alt="smoke">
            </div>

            <!-- Bild 7 -->
            <div class="masonry-item">
                <img src="kirchplatz.jpg" alt="kirchplatz">
            </div>

            <!-- Bild 8 -->
            <div class="masonry-item">
                <img src="fashionista.jpg" alt="fashionista">
            </div>

            <!--
            ╔═══════════════════════════════════════════════════╗
            ║  LAZY LOADING                                    ║
            ║                                                   ║
            ║  Ab dem 10. Bild loading="lazy" verwenden,        ║
            ║  damit die Seite schnell lädt:                    ║
            ║                                                   ║
            ║  <div class="masonry-item">                       ║
            ║      <img src="bild.jpg" alt="…" loading="lazy"> ║
            ║  </div>                                           ║
            ║                                                   ║
            ║  Die ersten 9 Bilder laden sofort (above the      ║
            ║  fold), alle weiteren erst beim Scrollen.         ║
            ╚═══════════════════════════════════════════════════╝
            -->

            <!-- Bild 9 -->
            <div class="masonry-item">
                <img src="fancy.jpg" alt="fancy">
            </div>

            <!-- ── Ab hier: Lazy Loading ── -->

            <!-- Bild 10 -->
            <div class="masonry-item">

            </div>

            <!-- Bild 11 -->

            <!-- Bild 18 -->

        </div>
    </section>

    <!-- ═══════════════════════════════════════
         ABOUT
    ═══════════════════════════════════════ -->
    <section id="about">
        <div class="about-inner">
            <h2>About</h2>
            <p>MOSTLY DUS IN B/W</p>
        </div>
    </section>

    <!-- ═══════════════════════════════════════
         KONTAKT
    ═══════════════════════════════════════ -->
    <section id="kontakt">
        <div class="kontakt-inner">
            <h2>Kontakt</h2>
            <p><a href="mailto:bilkandwhite@gmail.com">bilkandwhite@gmail.com</a></p>
        </div>
    </section>

    <!-- ═══════════════════════════════════════
         FOOTER
    ═══════════════════════════════════════ -->
    <footer>
        <p>&copy; 2026 BiLK&WHITE. Alle Rechte vorbehalten.</p>
        <p style="margin-top: 12px;"><a href="datenschutz-impressum.html" style="color: var(--brand-text-subtle); text-decoration: none; font-size: 12px; font-weight: 300; letter-spacing: 1px; border-bottom: 1px solid var(--brand-border); transition: opacity 0.3s ease;" onmouseover="this.style.opacity='0.6'" onmouseout="this.style.opacity='1'">Datenschutz &amp; Impressum</a></p>
    </footer>

    <!-- ═══════════════════════════════════════
         JAVASCRIPT
    ═══════════════════════════════════════ -->
    <script>
        // Scroll-Animation: Bilder einblenden wenn sichtbar
        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry, index) => {
                if (entry.isIntersecting) {
                    // Gestaffeltes Einblenden
                    setTimeout(() => {
                        entry.target.classList.add('visible');
                    }, index * 80);
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.masonry-item').forEach(item => {
            observer.observe(item);
        });

        // Mobile Menü schließen bei Klick auf Link
        function closeMenu() {
            document.querySelector('.nav-links').classList.remove('open');
        }
    </script>

</body>
</html>
