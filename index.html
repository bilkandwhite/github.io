<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiLK&WHITE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', Arial, sans-serif;
            background: #ffffff;
            color: #111111;
            font-weight: 300;
            -webkit-font-smoothing: antialiased;
        }

        /* ── NAV ── */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 28px 48px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(8px);
            z-index: 100;
            border-bottom: 1px solid #f0f0f0;
        }
        nav .logo {
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        nav .nav-links a {
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
            color: #111;
            margin-left: 32px;
            transition: opacity 0.3s;
        }
        nav .nav-links a:hover { opacity: 0.4; }

        /* ── HERO ── */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 24px;
        }
        .hero h1 {
            font-size: 48px;
            font-weight: 300;
            letter-spacing: 12px;
            text-transform: uppercase;
            margin-bottom: 16px;
        }
        .hero p {
            font-size: 13px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #888;
        }
        .hero .scroll-hint {
            position: absolute;
            bottom: 40px;
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #bbb;
        }

        /* ── GALLERY ── */
        .gallery {
            max-width: 1200px;
            margin: 0 auto;
            padding: 80px 48px 120px;
        }
        .gallery-header {
            text-align: center;
            margin-bottom: 64px;
        }
        .gallery-header h2 {
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #888;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
        }
        .gallery-item {
            position: relative;
            overflow: hidden;
            aspect-ratio: 3 / 2;
            background: #f5f5f5;
        }
        .gallery-item.tall {
            aspect-ratio: 2 / 3;
            grid-row: span 2;
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }
        .gallery-item:hover img {
            transform: scale(1.03);
        }
        .gallery-item .caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 24px;
            background: linear-gradient(transparent, rgba(0,0,0,0.5));
            color: white;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .gallery-item:hover .caption { opacity: 1; }
        .caption h3 {
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .caption p {
            font-size: 11px;
            margin-top: 4px;
            opacity: 0.7;
        }

        /* ── ABOUT ── */
        .about {
            max-width: 640px;
            margin: 0 auto;
            padding: 80px 48px 120px;
            text-align: center;
        }
        .about h2 {
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 32px;
        }
        .about p {
            font-size: 16px;
            line-height: 1.8;
            color: #444;
        }

        /* ── CONTACT ── */
        .contact {
            text-align: center;
            padding: 80px 48px 120px;
            border-top: 1px solid #f0f0f0;
        }
        .contact h2 {
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 24px;
        }
        .contact a {
            font-size: 24px;
            font-weight: 300;
            color: #111;
            text-decoration: none;
            border-bottom: 1px solid #ddd;
            padding-bottom: 4px;
            transition: border-color 0.3s;
        }
        .contact a:hover { border-color: #111; }

        /* ── FOOTER ── */
        footer {
            text-align: center;
            padding: 32px 48px;
            border-top: 1px solid #f0f0f0;
        }
        footer p {
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #bbb;
        }
        footer a {
            color: #bbb;
            text-decoration: none;
            transition: color 0.3s;
        }
        footer a:hover { color: #111; }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            nav { padding: 20px 24px; }
            nav .nav-links a { margin-left: 20px; font-size: 11px; }
            .hero h1 { font-size: 28px; letter-spacing: 8px; }
            .gallery { padding: 60px 24px 80px; }
            .gallery-grid { grid-template-columns: 1fr; gap: 16px; }
            .gallery-item.tall { grid-row: span 1; aspect-ratio: 3/2; }
            .about { padding: 60px 24px 80px; }
            .contact { padding: 60px 24px 80px; }
            .contact a { font-size: 18px; }
        }
    </style>
</head>
